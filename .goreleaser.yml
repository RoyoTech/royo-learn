# GoReleaser configuration for royo-learn
# Usage: goreleaser release --snapshot --clean
version: 2

project_name: royo-learn

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: royo-learn
    main: ./cmd/royo-learn
    binary: royo-learn
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X agent-royo-learn/internal/buildinfo.Version={{.Version}}
      - -X agent-royo-learn/internal/buildinfo.Commit={{.Commit}}
      - -X agent-royo-learn/internal/buildinfo.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - id: default
    format: tar.gz
    # Windows uses .zip for convenience.
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - install.sh
      - install.ps1

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: default
    artifacts: archive
    documents:
      - "{{ .ProjectName }}-{{ .Version }}-spdx.sbom.json"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: RoyoTech
    name: royo-learn
  prerelease: auto
  footer: |
    ## Installation

    ### Linux/macOS
    ```bash
    curl -fsSL https://github.com/RoyoTech/royo-learn/releases/latest/download/install.sh | bash
    ```

    ### Windows
    ```powershell
    Invoke-WebRequest -Uri https://github.com/RoyoTech/royo-learn/releases/latest/download/install.ps1 -OutFile install.ps1
    .\install.ps1
    ```
