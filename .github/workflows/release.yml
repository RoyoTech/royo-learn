name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

jobs:
  tagged-sha:
    name: Prove successful CI for tagged SHA
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - name: Check out exact successful CI SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Require one release tag at the successful SHA
        id: tag
        shell: bash
        env:
          PROVEN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(git tag --points-at "$PROVEN_SHA" --list 'v*')
          if [[ ${#tags[@]} -eq 0 ]]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "sha=$PROVEN_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ${#tags[@]} -ne 1 ]]; then
            printf 'expected exactly one v* tag at %s, found %s\n' "$PROVEN_SHA" "${tags[*]}" >&2
            exit 1
          fi
          tag="${tags[0]}"
          test "$(git rev-list -n 1 "$tag")" = "$PROVEN_SHA"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$PROVEN_SHA" >> "$GITHUB_OUTPUT"

  goreleaser:
    name: GoReleaser
    needs: tagged-sha
    if: needs.tagged-sha.outputs.tag != ''
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out proven tagged SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.tagged-sha.outputs.sha }}
          fetch-depth: 0
      - name: Verify checked-out tag identity
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.tagged-sha.outputs.tag }}
          RELEASE_SHA: ${{ needs.tagged-sha.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_SHA"
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.26.x'
          check-latest: false
      - name: Run pinned GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
