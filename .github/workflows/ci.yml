name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # Prove the declared minimum and current stable toolchains on every supported OS.
  quality:
    name: ${{ matrix.os }} / go ${{ matrix.go }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        go:
          - '1.25.0'
          - '1.26.x'
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: ${{ matrix.go }}
          check-latest: false
      - name: Format check
        shell: bash
        run: go fmt ./... && git diff --exit-code
      - name: Module tidy check
        shell: bash
        run: go mod tidy && git diff --exit-code -- go.mod go.sum
      - name: Verify dependencies
        shell: bash
        run: go mod verify
      - name: Vet
        shell: bash
        run: go vet ./...
      - name: Build
        shell: bash
        run: go build ./cmd/royo-learn
      - name: Test (race)
        if: runner.os == 'Linux'
        run: go test -race -count=1 ./...
      - name: Test
        if: runner.os != 'Linux'
        shell: bash
        run: go test -count=1 ./...

  # Compile every target shipped by .goreleaser.yml, including targets CI cannot execute.
  cross-build:
    name: cross-build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o /dev/null ./cmd/royo-learn

  # Exercise the installed binary from an empty project, not the source tree.
  clean-install:
    name: clean install smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: Install into a clean GOBIN
        run: |
          set -euo pipefail
          export GOBIN="$(mktemp -d)/bin"
          go install ./cmd/royo-learn
          echo "$GOBIN" >> "$GITHUB_PATH"
          echo "GOBIN=$GOBIN" >> "$GITHUB_ENV"
      - name: Run through the installed binary
        run: |
          set -euo pipefail
          project="$(mktemp -d)"
          cd "$project"
          git init -q .
          "$GOBIN/royo-learn" init --project-root "$project"
          "$GOBIN/royo-learn" doctor --project-root "$project" --json
          "$GOBIN/royo-learn" e2e --temp
      - name: Test fail-closed Unix installer
        run: bash scripts/test-install.sh

  windows-installer:
    name: Windows installer safety
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.26.x'
          check-latest: false
      - name: Test fail-closed PowerShell installer
        shell: pwsh
        run: ./scripts/test-install.ps1

  coverage:
    name: Coverage gates / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: domain
            package: ./internal/domain
            threshold: '80'
          - name: storage
            package: ./internal/storage
            threshold: '80'
          - name: critical-publish
            package: ./internal/publish
            threshold: '90'
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.26.x'
          check-latest: false
      - name: Measure and enforce coverage
        shell: bash
        env:
          COVER_PACKAGE: ${{ matrix.package }}
          COVER_THRESHOLD: ${{ matrix.threshold }}
        run: |
          set -euo pipefail
          profile="coverage-${{ matrix.name }}.out"
          go test -p 1 -count=1 -coverpkg="$COVER_PACKAGE" -coverprofile="$profile" ./...
          percent="$(go tool cover -func="$profile" | awk '/^total:/ {gsub("%", "", $3); print $3}')"
          awk -v actual="$percent" -v required="$COVER_THRESHOLD" 'BEGIN { if (actual + 0 < required + 0) { printf "coverage %.1f%% is below %.1f%%\n", actual, required; exit 1 } }'
          printf '%s coverage: %s%% (required: %s%%)\n' "$COVER_PACKAGE" "$percent" "$COVER_THRESHOLD"
