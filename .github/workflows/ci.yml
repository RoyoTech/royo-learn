name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  quality:
    name: ${{ matrix.os }} quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: Format check
        shell: bash
        run: go fmt ./... && git diff --exit-code
      - name: Module tidy check
        shell: bash
        run: go mod tidy && git diff --exit-code -- go.mod go.sum
      - name: Verify dependencies
        shell: bash
        run: go mod verify
      - name: Test
        shell: bash
        run: go test -race ./...
      - name: Vet
        shell: bash
        run: go vet ./...
      - name: Build
        shell: bash
        run: go build ./cmd/royo-learn
